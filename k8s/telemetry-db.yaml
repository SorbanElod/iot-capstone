apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry-db-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telemetry-db
  template:
    metadata:
      labels:
        app: telemetry-db
    spec:
      containers:
      - name: mongodb
        image: mongo:6.0
        ports:
        - containerPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: telemetry-db-service
spec:
  selector:
    app: telemetry-db
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017
  type: ClusterIP