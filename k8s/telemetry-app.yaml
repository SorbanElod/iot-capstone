apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry-service-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telemetry-service
  template:
    metadata:
      labels:
        app: telemetry-service
    spec:
      containers:
      - name: telemetry-service
        image: selod/iot-telemetry-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
        env:
        - name: MONGO_URI
          value: "mongodb://telemetry-db-service:27017/telemetry_db"
        - name: PORT
          value: "3001"
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: telemetry-app-service
spec:
  selector:
    app: telemetry-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3001
  type: ClusterIP